name: fin_flutter
description: Aerospace fin flutter and divergence analysis application with FEA, VLM, CLT, and optimization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # File handling
  file_picker: ^8.0.0
  path_provider: ^2.1.0

  # OpenRocket .ork parsing
  archive: ^3.6.0
  xml: ^6.5.0

  # Charts
  fl_chart: ^0.68.0

  # PDF export
  pdf: ^3.11.0
  printing: ^5.13.0

  # Persistence
  shared_preferences: ^2.3.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/materials/
    - assets/examples/
    - assets/atmosphere/
